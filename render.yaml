services:
  - type: web
    name: gyakuten-server
    runtime: node
    region: singapore
    buildCommand: npm install && npm run build -w @pro-gyakuten/protocol && npm run build -w @pro-gyakuten/core && npm run build -w @pro-gyakuten/server
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
